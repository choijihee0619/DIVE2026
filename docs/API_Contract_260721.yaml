#
# 구버전 API_Contract_260714.yaml(40 op) 대비 변경 요약:
#   - 개명·대체 6: GET /counsel/{id}→/counsel-queue/{id}, GET /hug/dashboard→5개 분할,
#     POST /notifications/{id}/read→PATCH, POST /ml/counsel/predict→/ml/counsel/classify,
#     /verifications 경로변수 verification_id→evidence_id (GET·decision)
#   - 미구현 잔여 10: /admin/blockchain-logs·model-status·system-logs,
#     /entity-risk-groups/{id}, /recovery-predictions/{id}(+/similar),
#     /address/normalize, /ml/duration/predict, /ml/risk/predict, /referrals
#   - 신규 31: esign 7, hug/dashboard 5, counsel-queue 3, incidents 2(목록·상태변경),
#     landlords 3, properties 5, notifications 3, ml 2, rag/answer, blockchain 목록,
#     auth/signup, users/{id}, evidence-requests 생성 등
# 상세 대조표: docs/구현현황_문서정합_260721.md
# =============================================================================

