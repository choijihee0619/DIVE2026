components:
  schemas:
    AddressInput:
      properties:
        road_address:
          type: string
          title: Road Address
        jibun_address:
          anyOf:
          - type: string
          - type: 'null'
          title: Jibun Address
        adm_cd:
          anyOf:
          - type: string
          - type: 'null'
          title: Adm Cd
        bd_mgt_sn:
          anyOf:
          - type: string
          - type: 'null'
          title: Bd Mgt Sn
        zip_no:
          anyOf:
          - type: string
          - type: 'null'
          title: Zip No
        dong:
          anyOf:
          - type: string
          - type: 'null'
          title: Dong
        ho:
          anyOf:
          - type: string
          - type: 'null'
          title: Ho
      type: object
      required:
      - road_address
      title: AddressInput
    AnchorRequest:
      properties:
        event_type:
          type: string
          title: Event Type
        reference_id:
          type: string
          title: Reference Id
        result_hash:
          anyOf:
          - type: string
          - type: 'null'
          title: Result Hash
        payload:
          anyOf:
          - type: object
          - type: 'null'
          title: Payload
        model_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Model Version
      type: object
      required:
      - event_type
      - reference_id
      title: AnchorRequest
    Body_submit_evidence_api_v1_evidence_post:
      properties:
        file:
          type: string
          format: binary
          title: File
      type: object
      required:
      - file
      title: Body_submit_evidence_api_v1_evidence_post
    ContractCreateRequest:
      properties:
        property_id:
          type: string
          title: Property Id
        deposit:
          type: integer
          exclusiveMinimum: 0.0
          title: Deposit
        contract_start_date:
          type: string
          format: date
          title: Contract Start Date
        contract_end_date:
          type: string
          format: date
          title: Contract End Date
        landlord_type:
          $ref: '#/components/schemas/LandlordType'
        housing_type:
          $ref: '#/components/schemas/HousingType'
        landlord_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Landlord Id
      type: object
      required:
      - property_id
      - deposit
      - contract_start_date
      - contract_end_date
      - landlord_type
      - housing_type
      title: ContractCreateRequest
    CounselClassifyRequest:
      properties:
        text:
          type: string
          maxLength: 8000
          minLength: 10
          title: Text
          description: 상담 상황 요약 텍스트
      type: object
      required:
      - text
      title: CounselClassifyRequest
    CounselQueueCreateRequest:
      properties:
        text:
          type: string
          maxLength: 8000
          minLength: 10
          title: Text
          description: 상담 요청 본문
        source:
          type: string
          enum:
          - chatbot_escalation
          - direct
          - incident_followup
          title: Source
          default: chatbot_escalation
        contract_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Contract Id
        region_sido:
          anyOf:
          - type: string
          - type: 'null'
          title: Region Sido
      type: object
      required:
      - text
      title: CounselQueueCreateRequest
    CounselQueueUpdateRequest:
      properties:
        status:
          type: string
          enum:
          - Waiting
          - InProgress
          - Answered
          - Closed
          title: Status
        answer_note:
          anyOf:
          - type: string
            maxLength: 8000
          - type: 'null'
          title: Answer Note
      type: object
      required:
      - status
      title: CounselQueueUpdateRequest
    EsignJoinRequest:
      properties:
        session_code:
          type: string
          maxLength: 8
          minLength: 4
          title: Session Code
          description: 세션 초대 코드
      type: object
      required:
      - session_code
      title: EsignJoinRequest
    EsignSessionCreateRequest:
      properties:
        contract_id:
          type: string
          title: Contract Id
      type: object
      required:
      - contract_id
      title: EsignSessionCreateRequest
    EsignVerifyRequest:
      properties:
        tampered_fields:
          anyOf:
          - type: object
          - type: 'null'
          title: Tampered Fields
          description: '예: {"deposit": 200000000} — 지정 시 변조 시나리오 검증'
      type: object
      title: EsignVerifyRequest
