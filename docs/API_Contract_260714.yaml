        회수율·회수등급 ML 출력(모델 2, ML개발가이드 13.7절·부록 C 1:1 대응). ML Schema 요구사항의
        "RecoveryPrediction" 출력 계약에 해당하며, 저장 리소스인 Entity Schema RecoveryPrediction이 이 스키마를 내장 재사용한다.
      required: [expected_recovery_rate, recovery_grade, model_version, model_result_status, is_mock]
