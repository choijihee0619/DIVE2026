x-error-codes:
  description: >-
    공통 오류코드 목록. 모든 오류 응답의 error.error_code는 이 표의 값 중 하나를 사용한다.
    Backend_API_명세서_260714.md에서 세부 원인/재시도 정책을 확장할 수 있으나 코드 체계는 본 문서를 기준으로 한다.
  codes:
    - code: ERROR-001
      name: INTERNAL_SERVER_ERROR
      http_status: 500
      description: 예상하지 못한 서버 오류.
    - code: ERROR-002
      name: VALIDATION_ERROR
      http_status: 422
      description: 요청 값 검증 실패(Zod/Pydantic 스키마 불일치).
    - code: ERROR-003
      name: AUTHENTICATION_REQUIRED
      http_status: 401
      description: Authorization 헤더 누락.
    - code: ERROR-004
      name: INVALID_TOKEN
      http_status: 401
      description: JWT 토큰 만료 또는 서명 불일치.
    - code: ERROR-005
      name: PERMISSION_DENIED
      http_status: 403
      description: 역할(role) 또는 verifier 서브 권한 부족.
    - code: ERROR-006
      name: RESOURCE_NOT_FOUND
      http_status: 404
      description: 리소스가 존재하지 않거나 본인 소유가 아님.
    - code: ERROR-007
      name: STATE_CONFLICT
      http_status: 409
      description: 중복 접수, 상태 전이 규칙 위반 등.
    - code: ERROR-008
      name: EXTERNAL_API_TIMEOUT
      http_status: 408
      description: 외부 API 응답 지연(데이터수집_및_API가이드 5장 Fallback Flow 트리거).
    - code: ERROR-009
      name: EXTERNAL_API_FAILED
      http_status: 502
      description: 외부 API 재시도 2회 실패. 캐시/업로드/MockFallback 전환 대상.
    - code: ERROR-010
      name: MODEL_INFERENCE_FAILED
      http_status: 500
      description: ML 모델 로딩/추론 실패. ModelResultStatus=RuleOnlyFallback으로 전환.
    - code: ERROR-011
      name: MODEL_INSUFFICIENT_DATA
      http_status: 422
      description: 필수 Feature 결측으로 추론 불가. ModelResultStatus=InsufficientData.
    - code: ERROR-012
      name: BLOCKCHAIN_ANCHOR_FAILED
      http_status: 502
      description: 온체인 기록 실패. BlockchainStatus=Failed, DB 상태는 별도 유지.
