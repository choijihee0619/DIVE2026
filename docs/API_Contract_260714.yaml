        deposit_range:
          type: [string, "null"]
          example: "1억~2억"
        housing_type:
          $ref: '#/components/schemas/HousingType'
        counsel_text:
          type: [string, "null"]
          description: 상담 원문(비식별 처리, ML개발가이드 27장 개인정보 원칙 적용).
        prediction:
          $ref: '#/components/schemas/CounselPrediction'
        created_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
    RecoveryGroup:
      type: object
      description: HUG-03 유사사건 비교용 집단 통계 엔터티(ML개발가이드 13.7절 similar_group_summary 확장).
      required: [recovery_group_id, sample_size]
      properties:
        recovery_group_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        criteria:
          type: string
          enum: [region, housing_type, procedure_type]
        region:
          type: [string, "null"]
        housing_type:
          $ref: '#/components/schemas/HousingType'
        sample_size:
          type: integer
          minimum: 0
          example: 8
        average_recovery_rate:
          type: [number, "null"]
          minimum: 0
          maximum: 1
        average_duration_days:
          type: [integer, "null"]
        is_low_sample_warning:
          type: boolean
          default: false
          description: sample_size가 임계값(기본 10) 미만이면 true(Frontend_UIUX_명세서 9.2절).
    EntityRiskGroup:
      type: object
      description: |
        법인 집단위험 엔터티(HUG-04). 비식별 법인키가 없어 개별 법인 추적을 제공하지 않으며(ML개발가이드 7.5절),
        지역/주택유형 집단 단위 신호만 제공한다.
      required: [entity_group_id, individual_entity_tracking_supported]
      properties:
        entity_group_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        region:
          type: [string, "null"]
        housing_type:
          $ref: '#/components/schemas/HousingType'
        dart_disclosure_ratio:
          type: [number, "null"]
          minimum: 0
          maximum: 1
        business_closed_ratio:
          type: [number, "null"]
          minimum: 0
          maximum: 1
        sample_size:
          type: integer
          minimum: 0
        individual_entity_tracking_supported:
          type: boolean
          const: false
          description: 항상 false. 비식별 법인키 부재로 개별 법인 추적 불가(ML개발가이드 7.5절).
        disclaimer:
          type: string
          example: "비식별 법인키 부재로 개별 법인 추적을 제공하지 않습니다."
    SystemLog:
      type: object
      description: 시스템 이벤트 로그 엔터티(데이터수집_및_API가이드 13장 개인정보 마스킹 원칙 적용).
      required: [log_id, log_level, message, logged_at]
      properties:
        log_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        log_level:
          type: string
          enum: [DEBUG, INFO, WARN, ERROR]
        message:
          type: string
          description: 개인정보 마스킹 적용된 로그 메시지.
          example: "API_TIMEOUT: business_status 조회 재시도 2회 후 MockFallback 전환"
        source_module:
          type: [string, "null"]
          example: "external_api_gateway"
        logged_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
    # ======================================================================
    # 4. ML Schema - 9종 (ML개발가이드_260714.md 20장·부록 C 기준. RecoveryPredictionOutput은
    #    ML개발가이드가 정의한 "회수 모델 출력(RecoveryPrediction)" 계약을 그대로 담되, Entity Schema의
    #    RecoveryPrediction(저장 리소스)과 이름이 충돌하지 않도록 Output 접미사를 붙여 재사용한다.
    #    CounselPrediction은 모델 1(상담분류) 계약이며 Counsel 엔터티·counsel/predict에서 재사용한다.
    # ======================================================================
    ModelMetadata:
      type: object
      description: 모델 아티팩트 메타데이터(ML개발가이드 19장 저장 구조, ADM-01 화면).
      required: [model_key, model_version]
      properties:
        model_key:
          type: string
          enum: [counsel_classifier, recovery_regressor, duration_regressor, risk_similarity]
          example: counsel_classifier
        model_version:
          type: string
          description: "{model_key}_v{MAJOR.MINOR.PATCH}(ML개발가이드 부록 G 버전 규칙)."
          example: counsel_classifier_v1.0.0
        loaded_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
        recent_status:
          $ref: '#/components/schemas/ModelResultStatus'
        average_latency_ms:
          type: [integer, "null"]
          minimum: 0
        rule_only_fallback_count_24h:
          type: integer
          minimum: 0
          default: 0
    PredictionMetadata:
      type: object
      description: 모든 ML 추론 응답에 공통으로 포함되는 메타데이터 조각(재사용 대상). Risk/Counsel/Recovery/Duration 각 출력 스키마가 이 필드셋을 내장한다.
      required: [model_version, model_result_status, is_mock]
      properties:
        model_version:
          type: string
          example: recovery_regressor_v1.0.0
        model_result_status:
          $ref: '#/components/schemas/ModelResultStatus'
        is_mock:
          type: boolean
          default: false
          description: "시연/Mock 여부(ML개발가이드 23장). true인 경우 UI는 반드시 MockBadge를 표시한다."
        inference_ms:
          type: [integer, "null"]
          minimum: 0
          readOnly: true
    TopFactor:
      type: object
      description: SHAP 기반 상위 기여 요인 1건(ML개발가이드 17장). 인과관계가 아닌 예측 기여도로 해석한다.
      required: [feature_name, contribution]
      properties:
        feature_name:
          type: string
          example: mortgage_ratio
        contribution:
          type: number
          description: SHAP 값 또는 정규화된 기여도(절대적 인과 효과 아님).
          example: 0.34
        direction:
          type: string
          enum: [increase, decrease]
          example: increase
    FeatureImportance:
      type: object
      description: 모델 단위 전체 Feature Importance 1건(ML개발가이드 17.1절, 관리자 상세 근거용).
      required: [feature_name, importance]
      properties:
        feature_name:
          type: string
          example: claim_amount
        importance:
          type: number
          minimum: 0
          example: 0.28
        rank:
          type: [integer, "null"]
          minimum: 1
    ShapExplanation:
      type: object
      description: |
        케이스 단위 SHAP 설명 묶음(ML개발가이드 17장). 사용자 화면에는 natural_language_summary(2~3개 요인)만,
        관리자 화면에는 top_factors 상세까지 노출한다(설명 수준 구분 원칙).
      required: [top_factors]
      properties:
        top_factors:
          type: array
          items:
            $ref: '#/components/schemas/TopFactor'
        feature_importance:
          type: array
          items:
            $ref: '#/components/schemas/FeatureImportance'
        natural_language_summary:
          type: [string, "null"]
          description: 금지 표현(부록 F) 검증을 거친 자연어 요약 2~3문장.
          example: "예상 처리기간이 길어진 주요 요인은 동일 절차유형의 과거 장기화 사례와 채권규모입니다."
    RiskPrediction:
      type: object
      description: |
        위험유사도 ML 출력(개발설계보고서 6.1절 "ML 위험유사도", ML개발가이드 21장 Rule Engine 결합 대상).
        "실제 사고확률"이 아닌 과거 사고사례 기반 위험유사도·매칭 패턴만 제공한다(ML개발가이드 부록 F).
      required: [risk_grade_suggestion, model_version, model_result_status, is_mock]
      properties:
        risk_grade_suggestion:
          $ref: '#/components/schemas/RiskGrade'
        similarity_score:
          type: [number, "null"]
          minimum: 0
          maximum: 1
          description: 과거 고위험 사고사례군과의 상대적 유사도(확률이 아님).
          example: 0.82
        matched_patterns:
          type: array
          items:
            type: string
          example: ["근저당 고비율 사고 패턴"]
        top_factors:
          type: array
          items:
            $ref: '#/components/schemas/TopFactor'
        model_version:
          type: string
          example: risk_similarity_v1.0.0
        model_result_status:
          $ref: '#/components/schemas/ModelResultStatus'
        is_mock:
          type: boolean
          default: false
    CounselPrediction:
      type: object
      description: 상담 분류 ML 출력(모델 1, ML개발가이드 12.8절·부록 C 1:1 대응).
      required: [predicted_dispute_type, dispute_type_confidence, expert_referral, model_version, model_result_status, is_mock]
      properties:
        predicted_dispute_type:
          type: string
          description: DisputeType 한글 라벨(ML개발가이드 원본 라벨 그대로 유지, DisputeType enum과 매핑은 Backend에서 확정).
          example: "경매·공매"
        dispute_type_confidence:
          type: number
          minimum: 0
          maximum: 1
          description: 모델의 상대적 확신도(softmax 원시값, 보정 전). "실제 확률"이 아니다(ML개발가이드 12.8절).
          example: 0.78
        predicted_stage:
          type: [string, "null"]
          example: "HUG이행청구"
        stage_confidence:
          type: [number, "null"]
          minimum: 0
          maximum: 1
          example: 0.55
        expert_referral:
          type: boolean
          example: true
        expert_referral_reasons:
          type: array
          items:
            type: string
