openapi: 3.1.0
info:
  title: HUG 안심전세 체인 API Contract
  version: "1.0.0"
  summary: >-
    Frontend / Backend / ML / Blockchain 공통 계약(Single Source of Truth) 문서.
    Backend 구현 문서가 아니며 FastAPI 코드도 아니다.
  description: |
    ## 문서 성격
    본 문서는 HUG × 아이엔 안심전세 체인(HUG 안심전세 체인) 프로젝트의 **Frontend / Backend / ML / Blockchain 공통 계약**이다.
    Backend를 새로 설계하는 문서가 아니라, 이미 확정된 4개 상위 문서(개발설계보고서, 데이터수집 및 API가이드, ML개발가이드,
    Frontend UI/UX 명세서)를 근거로 프론트엔드가 axios 호출을 만들고, 백엔드가 FastAPI를 구현하고, ML Notebook이
    inference endpoint를 구현할 수 있도록 하는 **OpenAPI 3.1 단일 기준선**이다.

    ## 서비스 한 줄 요약
    HUG 안심전세 체인은 위험을 점수화하는 앱이 아니라, 계약 전 위험을 발견하고 위험조건이 실제로 해소되었는지
    증빙과 외부 API로 검증하며, 계약서·검증 이력을 블록체인에 공증하고, 계약 만료 전 D-90 반환계획 확인과
    사고 후 HUG 채권관리 인계까지 하나의 생애주기로 연결하는 주거안전 인프라다.

    ## 선행 문서와 우선순위
    | 영역 | 기준 문서 | 충돌 시 우선순위 |
    |---|---|---|
    | 공통 식별자·상태 | 개발설계보고서_260714_수정보완.docx 10장, 부록 B·C | 최우선 |
    | 외부 API/Mock | 데이터수집_및_API가이드_260714.md | 외부 API 상세 |
    | ML 입출력 계약 | ML개발가이드_260714.md 20장, 부록 C | 모델 Request/Response |
    | 화면·Route·API Mapping | Frontend_UIUX_명세서_260714.md 2·5·8장 | 화면-API 연결 |

    본 문서(API_Contract_260714.yaml)는 위 4개 문서의 API 관련 내용을 통합한 **실행 가능한 계약**이며,
    향후 작성될 Backend_API_명세서_260714.md, Blockchain_설계서_260714.md는 본 계약과 충돌할 수 없다.

    ## 데이터 신뢰성에 대한 명시 (ML개발가이드 2·30장 계승)
    - 정상계약(사고 없이 종료된 계약) 데이터가 없어 "실제 사고확률"을 추정하는 모델은 존재하지 않는다.
    - HUG 사고·경매·배당 데이터 7종은 전량 합성데이터이며, 회수·처리기간 관련 응답은 "합성데이터 기준 패턴"이다.
    - 응답 바디의 `is_mock`, `ModelResultStatus`, `APIResultStatus` 필드는 화면에서 항상 사용자에게 노출되어야 하며 숨겨서는 안 된다.
    - 금지 표현(실제 사고확률/실제 미반환확률/인과효과 등)은 API 설명·example에도 사용하지 않는다(ML개발가이드 부록 F).

    ## 온체인 금지 원칙 (개발설계보고서 8장)
    계약서 원문, 등기부 원문, 주민등록번호, 사업자등록번호 원문, 상세주소, 예금·소득정보, 상담본문, 세금자료 원문은
    어떤 API 응답에도 블록체인 저장 대상으로 포함하지 않는다. 블록체인에는 해시와 상태 이벤트만 기록한다.

    ## 문서 요약 통계
    본 문서 최상위 `x-contract-summary` 확장 필드 참조. API 40개, Schema 79개, Enum 14개,
    Entity 19개, ML Endpoint 4개, Blockchain Endpoint 2개.
  contact:
    name: HUG 안심전세 체인 개발팀 (DIVE 2026)
    email: heeppiness@pukyong.ac.kr
  license:
    name: Internal Use Only - DIVE 2026 Hackathon
externalDocs:
  description: >-
    개발설계보고서_260714_수정보완.docx / 데이터수집_및_API가이드_260714.md /
    ML개발가이드_260714.md / Frontend_UIUX_명세서_260714.md (선행 문서 4종, 동일 Google Drive 폴더)
  url: "https://drive.google.com/drive/folders/DIVE2026"
servers:
  - url: "https://api.hug-anshim-jeonse.dev/api/v1"
    description: Mock/Sandbox 서버 (해커톤 시연용, MockFallback 전면 허용)
  - url: "https://staging-api.hug-anshim-jeonse.dev/api/v1"
    description: Staging 서버 (외부 API 실계정 부분 연동)
  - url: "https://api.hug-anshim-jeonse.dev/api/v1"
    description: Production 서버 (MVP 이후, 발제사 승인 후 전환)
  - url: "http://localhost:8000/api/v1"
    description: 로컬 개발 서버 (FastAPI uvicorn 기본 포트)
tags:
  - name: Auth
    description: 로그인, 세션 조회, 로그아웃. JWT Bearer 발급/폐기를 담당한다.
  - name: Property-Risk
    description: 주소 정규화, 위험진단 요청/조회, RAG 상담 근거 검색. 임차인(tenant) 계약 전 단계의 핵심 API.
  - name: Contract
    description: 계약 생성/조회, 계약 타임라인, D-90 반환계획 조회.
  - name: Evidence-Verification
    description: 보완요청 조회, 증빙 제출, 검증 상태 조회·결정, 반환계획 제출, 사고 접수, 전문가 이관.
  - name: Advisor
    description: 아이엔 상담 큐, 상담 상세(RAG 근거 포함).
  - name: HUG
    description: HUG 채권관리 대시보드, 사건 상세, 회수예측, 유사사건 비교, 법인 집단위험.
  - name: Admin
    description: 사용자·권한 관리, 외부 API/모델 상태, 블록체인 로그, 시스템 로그, Health check.
  - name: Blockchain
    description: 해시·상태 이벤트 온체인 기록(Polygon Amoy 또는 Mock chain) 및 조회.
  - name: ML
    description: >-
      위험유사도(Risk), 상담분류(Counsel), 회수등급(Recovery), 처리기간(Duration) 추론 계약.
      ML개발가이드_260714.md 20장·부록 C와 1:1 대응.
  - name: Notification
    description: 알림 센터 조회 및 읽음 처리.
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      operationId: authLogin
      tags: [Auth]
      summary: 로그인
      description: |
        이메일/비밀번호 기반 로그인 후 JWT Access Token과 역할(role) 클레임을 발급한다.
        발급된 role은 tenant, landlord, advisor, hug_admin, system_admin, verifier 중 하나이며
        Frontend RoleGuard가 이 값을 기준으로 라우트 접근을 제어한다(Frontend_UIUX_명세서 3장).
      security: []
      x-permission: 없음 (비로그인 사용자 전용)
      x-mock-supported: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: tenant01@example.com
              password: "P@ssw0rd!"
      responses:
        "200":
          description: 로그인 성공
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestIdHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                status: Success
                data:
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  token_type: Bearer
                  expires_in: 3600
                  user:
                    user_id: "8f14e45f-ceea-4b4f-9c1a-000000000001"
                    role: tenant
                    display_name: "홍길동"
                request_id: "req_20260714_0001"
        "422":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "408":
          $ref: '#/components/responses/Timeout'
  /auth/me:
    get:
      operationId: authMe
      tags: [Auth]
      summary: 내 세션 정보 조회
      description: |
        Bearer 토큰으로 현재 로그인한 사용자 정보(user_id, role, display_name, 최근 로그인 시각)를 조회한다.
        Frontend `useSessionStore` 초기화 시 호출한다(Frontend_UIUX_명세서 13.2절).
      x-permission: 로그인한 전체 역할 (tenant, landlord, advisor, hug_admin, system_admin, verifier)
      x-mock-supported: true
      responses:
        "200":
          description: 세션 정보 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
              example:
                status: Success
                data:
                  user_id: "8f14e45f-ceea-4b4f-9c1a-000000000001"
                  role: tenant
                  display_name: "홍길동"
                  email: "tenant01@example.com"
                  created_at: "2026-06-01T09:00:00+09:00"
                  last_login_at: "2026-07-14T09:12:00+09:00"
                request_id: "req_20260714_0002"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
  /auth/logout:
    post:
      operationId: authLogout
      tags: [Auth]
      summary: 로그아웃
      description: 현재 세션의 Access Token을 서버 측에서 무효화한다. Refresh Token 정책은 Backend_API_명세서_260714.md에서 확정한다.
      x-permission: 로그인한 전체 역할
      x-mock-supported: true
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                status: Success
                data: { logged_out: true }
                request_id: "req_20260714_0003"
        "401":
          $ref: '#/components/responses/Unauthorized'
  /address/normalize:
    post:
      operationId: addressNormalize
      tags: [Property-Risk]
      summary: 주소 정규화
      description: |
        사용자가 입력한 주소 검색어를 도로명주소 API(데이터수집_및_API가이드 2.2.2 ②) 기준으로 정규화하여
        표준 도로명주소, 지번주소, 법정동코드, 건물관리번호를 반환한다. TEN-01 화면에서 호출한다.
        외부 API 실패 시 4.5절 Fallback Flow(재시도 2회 → 캐시 → 업로드/Mock)를 따르며 `APIResultStatus`로 결과를 구분한다.
      x-permission: tenant
      x-mock-supported: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressNormalizeRequest'
            example:
              keyword: "서울특별시 강남구 테헤란로 000"
      responses:
        "200":
          description: 주소 정규화 성공(Success/Partial/MockFallback 포함)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AddressNormalizeResponse'
              example:
                status: Success
                data:
                  api_call_id: "a1b2c3d4-0000-0000-0000-000000000001"
                  api_result_status: Success
                  candidates:
                    - road_address: "서울특별시 강남구 테헤란로 000"
                      jibun_address: "서울특별시 강남구 역삼동 000-00"
                      adm_cd: "1168010100"
                      bd_mgt_sn: "1168010100100010000000001"
                      zip_no: "06212"
                  fetched_at: "2026-07-14T13:30:00+09:00"
                  source: codef_juso_api
                request_id: "req_20260714_0004"
        "422":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "408":
          $ref: '#/components/responses/Timeout'
        "206":
          $ref: '#/components/responses/Partial'
  /risk/diagnose:
    post:
      operationId: riskDiagnose
      tags: [Property-Risk]
      summary: 통합 위험진단 요청
      description: |
        정규화된 주소와 계약정보를 입력받아 CODEF 등기부(또는 Mock) → 건축물대장 → 실거래가 → 공시가격(Mock)
        → 사업자등록/DART 순으로 외부 API를 오케스트레이션하고(데이터수집_및_API가이드 4장 연동 순서),
        Rule Engine 결과와 ML 위험유사도(RiskPrediction)를 결합해 risk_assessment_id를 생성한다(ML개발가이드 21장 결합 원칙).
        규칙 엔진과 ML 결과가 충돌하면 보수적 결과(고위험)를 우선한다. TEN-02 화면이 진행 상태를 폴링한다.
      x-permission: tenant
      x-mock-supported: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskDiagnoseRequest'
            example:
              property_id: "c1a2b3c4-0000-0000-0000-000000000010"
              deposit: 400000000
              contract_start_date: "2026-08-01"
              contract_end_date: "2028-07-31"
              landlord_type: INDIVIDUAL
              housing_type: MULTI_HOUSEHOLD
      responses:
        "202":
          description: 위험진단 접수(비동기 오케스트레이션 시작). Backend는 이후 GET /risk/{case_id}로 폴링을 유도한다.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          case_id:
                            $ref: '#/components/schemas/UUID'
                          risk_assessment_id:
                            $ref: '#/components/schemas/UUID'
                          api_progress:
                            type: array
                            items:
                              $ref: '#/components/schemas/APIProgressStep'
              example:
                status: Success
                data:
                  case_id: "d2e3f4a5-0000-0000-0000-000000000020"
                  risk_assessment_id: "e3f4a5b6-0000-0000-0000-000000000030"
                  api_progress:
                    - api_name: registry_codef
                      status: Success
                    - api_name: building_registry
                      status: Success
                    - api_name: rtms_price
                      status: Reviewing
                    - api_name: business_status
                      status: Failed
                request_id: "req_20260714_0005"
        "422":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "408":
          $ref: '#/components/responses/Timeout'
  /risk/{case_id}:
    get:
      operationId: getRiskResult
      tags: [Property-Risk]
      summary: 위험진단 결과 조회
      description: |
        case_id 기준 위험진단 결과(위험등급, risk_reasons, 해결가능/해결불가 구분, SHAP 자연어 요약, 데이터 출처,
        조회시각, model_version, ModelResultStatus)를 조회한다. TEN-03 화면의 주 데이터 소스다.
      x-permission: tenant (본인 소유 case_id만)
      x-mock-supported: true
      parameters:
        - $ref: '#/components/parameters/CaseIdPath'
        - $ref: '#/components/parameters/TraceIdHeaderParam'
      responses:
        "200":
          description: 위험진단 결과 조회 성공
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestIdHeader'
            X-Trace-ID:
              $ref: '#/components/headers/TraceIdHeader'
            X-Model-Version:
              $ref: '#/components/headers/ModelVersionHeader'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RiskAssessment'
              example:
                status: Success
                data:
                  risk_assessment_id: "e3f4a5b6-0000-0000-0000-000000000030"
                  case_id: "d2e3f4a5-0000-0000-0000-000000000020"
                  contract_id: "f4a5b6c7-0000-0000-0000-000000000040"
                  risk_grade: HIGH
                  risk_reasons: ["근저당설정", "전세가율 높음"]
                  resolvable_risks: ["근저당 말소 예정"]
                  unresolvable_risks: ["건물 구조적 노후"]
                  ml_prediction:
                    risk_grade_suggestion: HIGH
                    similarity_score: 0.82
                    matched_patterns: ["근저당 고비율 사고 패턴"]
                    top_factors:
                      - feature_name: mortgage_ratio
                        contribution: 0.34
                        direction: increase
                    model_version: risk_similarity_v1.0.0
                    model_result_status: Success
                    is_mock: false
                  data_sources: ["codef_registry", "rtms_price", "building_registry"]
                  fetched_at: "2026-07-14T13:30:00+09:00"
                  blockchain_tx_id: null
                  created_at: "2026-07-14T13:31:00+09:00"
                request_id: "req_20260714_0006"
        "404":
          $ref: '#/components/responses/NotFound'
        "403":
          $ref: '#/components/responses/Forbidden'
        "401":
          $ref: '#/components/responses/Unauthorized'
  /rag/search:
    post:
      operationId: ragSearch
      tags: [Property-Risk]
      summary: 상담·제도 근거 검색 (RAG)
      description: |
        위험진단 결과 또는 상담 분류 결과를 쿼리 조건으로 삼아 유사 상담사례·제도 근거 문서를 Hybrid 검색(BM25+Vector)한다
        (데이터수집_및_API가이드 11장). 근거 없음일 경우 결과 없음으로 명시적으로 표시하며 근거 없이 결론을 만들지 않는다
        (ML개발가이드 부록 F). TEN-03, ADV-01 화면에서 공통으로 사용한다.
      x-permission: tenant, advisor
      x-mock-supported: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagSearchRequest'
            example:
              topic: "보증금미반환"
              region: "서울"
              consultation_stage: "계약전"
              top_k: 3
      responses:
        "200":
          description: RAG 검색 성공(근거 0건 포함)
          content:
            application/json:
              schema:
                allOf:
