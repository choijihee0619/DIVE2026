        incident_id:
          $ref: '#/components/schemas/UUID'
        recovery:
          $ref: '#/components/schemas/RecoveryPredictionOutput'
        duration:
          $ref: '#/components/schemas/DurationPrediction'
        blockchain_tx_id:
          type: [string, "null"]
          format: uuid
          readOnly: true
        created_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
    BlockchainTransaction:
      type: object
