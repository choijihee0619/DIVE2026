      description: 아이엔 상담 엔터티(ML개발가이드 12장 모델 1 입력, Frontend_UIUX_명세서 ADV-00~01).
      required: [counsel_id, region_sido]
      properties:
        counsel_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        region_sido:
          type: string
          example: "서울"
        region_sigungu:
          type: [string, "null"]
