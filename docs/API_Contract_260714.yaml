        chain_id:
          type: integer
          example: 80002
          description: Polygon Amoy 테스트넷 chain_id(확인 필요, Blockchain_설계서_260714.md에서 확정).
        contract_address:
          type: [string, "null"]
        tx_hash:
          type: [string, "null"]
          readOnly: true
        result_hash:
          type: string
          readOnly: true
        blockchain_status:
          $ref: '#/components/schemas/BlockchainStatus'
        is_mock:
          type: boolean
          default: false
        created_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
        confirmed_at:
          type: [string, "null"]
          format: date-time
          readOnly: true
    Notification:
