        회수·처리기간 예측 결과 엔터티(개발설계보고서 부록 B recovery_prediction_id).
        ML 원시 출력(모델 2·3, RecoveryPredictionOutput/DurationPrediction)을 감싸 저장 계층 정보를 추가한 리소스이며,
        ML Schema 섹션의 회수·처리기간 계약을 그대로 재사용한다(Schema 재사용 원칙).
      required: [recovery_prediction_id, incident_id, recovery, duration]
      properties:
        recovery_prediction_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
