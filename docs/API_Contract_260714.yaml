          default: false
    # ======================================================================
    # 5. Blockchain Schema - 6종 (개발설계보고서 8장, 데이터수집_및_API가이드 12장 기준)
    # ======================================================================
    DocumentHash:
      type: object
      description: 문서 원문의 SHA-256 해시(계약서·증빙 등). 원문 자체는 온체인 저장 금지 대상이다.
      required: [algorithm, hash_value]
      properties:
        algorithm:
          type: string
          enum: [SHA-256]
          default: SHA-256
        hash_value:
          type: string
          example: "sha256:9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08"
    ContractHash:
      type: object
      description: 계약 버전 공증용 해시 묶음(canonical JSON 기반, 데이터수집_및_API가이드 12장 Hash 생성 규칙).
      required: [contract_version_id, result_hash]
      properties:
        contract_version_id:
          $ref: '#/components/schemas/UUID'
        result_hash:
          type: string
          example: "sha256:2c624232cdd221771294dfbb310aca000a0df6ac8b66b696d90ef06fdefb64a"
        canonical_fields:
          type: array
          description: 해시 산출에 사용된 필드 목록(원문 값이 아닌 필드명만 노출).
          items:
            type: string
          example: ["case_id", "normalized_address_hash", "risk_grade", "model_version", "created_at"]
    AnchorRequest:
      type: object
      description: 온체인 기록 요청 바디(POST /blockchain/anchor).
      required: [event_type, reference_id, result_hash]
      properties:
        event_type:
          type: string
          description: 10.3절 공통 이벤트 중 온체인 기록 대상.
          example: VerificationCompleted
        reference_id:
          $ref: '#/components/schemas/UUID'
        result_hash:
          type: string
          example: "sha256:2c624232cdd221771294dfbb310aca000a0df6ac8b66b696d90ef06fdefb64a"
        model_version:
          type: [string, "null"]
          description: ML 결과를 함께 공증하는 경우에만 사용.
    AnchorResponse:
      type: object
      description: 온체인 기록 요청 접수 응답(BlockchainStatus=Pending으로 시작).
      required: [blockchain_tx_id, blockchain_status]
      properties:
        blockchain_tx_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        chain_id:
          type: integer
          example: 80002
        contract_address:
          type: [string, "null"]
        tx_hash:
          type: [string, "null"]
          readOnly: true
        blockchain_status:
          $ref: '#/components/schemas/BlockchainStatus'
        is_mock:
          type: boolean
          default: false
    TransactionReceipt:
      type: object
      description: 온체인 트랜잭션 영수증 요약(Blockchain_설계서_260714.md의 실제 receipt 구조를 요약 인용).
      required: [tx_hash, block_confirmed]
      properties:
        tx_hash:
          type: string
          example: "0x9a3f...c21e"
        block_number:
          type: [integer, "null"]
        block_confirmed:
          type: boolean
        gas_used:
          type: [integer, "null"]
        confirmed_at:
          type: [string, "null"]
          format: date-time
    BlockchainEvent:
      type: object
      description: 스마트컨트랙트 이벤트 로그 요약(Blockchain_설계서_260714.md 상세 이벤트 정의의 요약 인용).
      required: [event_name, tx_hash]
      properties:
        event_name:
          type: string
          example: VerificationConfirmed
        tx_hash:
          type: string
        args:
          type: object
          additionalProperties: true
          description: 이벤트 인자(해시·상태값만 포함, 개인정보/원문 금지).
    # ======================================================================
    # 6. Request/Response DTO (경로별 요청/응답 바디, 위 공통·엔터티·ML·블록체인 스키마를 재사용해 구성)
