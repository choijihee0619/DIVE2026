  /ml/risk/predict:
    post:
      operationId: mlRiskPredict
      tags: [ML]
      summary: "[ML] 위험유사도 추론"
      description: |
        규칙 엔진 Feature(권리부담·전세가율·건축물 특성 등)를 입력받아 과거 사고사례 기반 위험유사도를 추론한다.
        정상계약 데이터가 없어 "실제 사고확률"은 산출하지 않으며(ML개발가이드 2장 원칙 1·3), 출력은 위험유사도·매칭
        패턴·SHAP 기여도로 한정한다. `/risk/diagnose`가 내부적으로 이 계약을 호출해 Rule Engine 결과와 결합한다
        (ML개발가이드 21장). 모델 로딩 실패 시 `model_result_status=RuleOnlyFallback`으로 즉시 전환한다.
      x-permission: Backend 내부 서비스 호출 전용 (Risk Engine)
      x-mock-supported: true
      x-fallback-policy: |
        Mock: is_mock=true 필드로 표시(23장 10개 시나리오). Fallback: 외부 Feature 일부 결측 시 결측 플래그를 채워 추론.
        RuleOnlyFallback: 모델 로딩/추론 실패 시 규칙 엔진 결과만 반환(model_result_status=RuleOnlyFallback).
        InsufficientData: 필수 Feature 다수 결측 시 추론을 생략하고 InsufficientData 반환.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskPredictRequest'
            example:
              region_sido: "서울"
              mortgage_ratio: 0.29
              rights_burden_ratio: 0.935
              jeonse_ratio: 0.645
              has_seizure: false
              building_age_years: 12
              business_closed_flag: false
              dart_disclosure_flag: false
              model_version: risk_similarity_v1.0.0
      responses:
        "200":
          description: 위험유사도 추론 성공(Success/RuleOnlyFallback/InsufficientData 포함)
          headers:
            X-Model-Version:
              $ref: '#/components/headers/ModelVersionHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskPrediction'
              example:
                risk_grade_suggestion: HIGH
                similarity_score: 0.82
                matched_patterns: ["근저당 고비율 사고 패턴"]
                top_factors:
                  - feature_name: mortgage_ratio
                    contribution: 0.34
                    direction: increase
                  - feature_name: rights_burden_ratio
                    contribution: 0.21
                    direction: increase
                model_version: risk_similarity_v1.0.0
                model_result_status: Success
                is_mock: false
        "422":
          $ref: '#/components/responses/ValidationError'
        "206":
          $ref: '#/components/responses/Partial'
  /ml/counsel/predict:
    post:
      operationId: mlCounselPredict
      tags: [ML]
      summary: "[ML] 상담 분류 추론 (모델 1)"
      description: |
        상담 원문과 메타데이터를 입력받아 분쟁유형(8클래스), 진행단계(7클래스), 전문가 이관 필요도를 추론한다
        (ML개발가이드 12장, 부록 C). 표본이 938건으로 적어 `*_confidence`는 보정 전 원시 확신도이며 "실제 확률"로
        표현하지 않는다. ADV-01 화면에서 사용한다.
      x-permission: advisor
      x-mock-supported: true
      x-fallback-policy: |
        Mock: is_mock=true. Fallback: 텍스트 없이 구조화 Feature만 있는 경우 결합모델 대신 구조화 전용 모델로 대체.
        RuleOnlyFallback: 모델 로딩 실패 시 expert_referral_rule(규칙 기반 이관 라벨)만 반환.
        InsufficientData: 상담 원문과 구조화 Feature가 모두 없으면 InsufficientData 반환, 수동 분류 폼으로 전환(Frontend 5.12절).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CounselPredictRequest'
            example:
              region_sido: "서울"
              region_sigungu: "동작구"
              deposit_range: "1억~2억"
              contract_status: "계약중(종료예정)"
              housing_type: MULTI_HOUSEHOLD
              prior_right: "근저당설정"
              insurance_status: "가입"
              counsel_text: "다세대주택이며 9개호실이 근저당 공동담보로..."
      responses:
        "200":
          description: 상담 분류 추론 성공
          headers:
            X-Model-Version:
              $ref: '#/components/headers/ModelVersionHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounselPrediction'
              example:
                predicted_dispute_type: "경매·공매"
                dispute_type_confidence: 0.78
                predicted_stage: "HUG이행청구"
                stage_confidence: 0.55
                expert_referral: true
                expert_referral_reasons: ["분쟁유형=경매·공매 규칙 일치"]
                similar_case_query: { topic: "경매·공매", region: "서울" }
                model_version: counsel_classifier_v1.0.0
                model_result_status: Success
                is_mock: false
        "422":
          $ref: '#/components/responses/ValidationError'
  /ml/recovery/predict:
    post:
      operationId: mlRecoveryPredict
      tags: [ML]
      summary: "[ML] 회수율·회수등급 추론 (모델 2)"
      description: |
        HUG 경매·배당·사고 합성데이터 기반으로 학습된 회수율·회수등급을 추론한다(ML개발가이드 13장, 부록 C).
        합성데이터 기준 패턴이며 실제 예측 성능을 검증한 것이 아니다(2장 원칙 5). HUG-02 화면과 `/hug/dashboard` 집계가 사용한다.
      x-permission: hug_admin (Backend 내부 Recovery Service 경유)
      x-mock-supported: true
      x-fallback-policy: |
        Mock: is_mock=true(mock_scenario_6/7 대응). Fallback: 회수율 회귀모델 실패 시 등급 분류모델 결과만 반환.
        RuleOnlyFallback: 모델 로딩 실패 시 지역/주택유형 group median(15장 Baseline)으로 대체.
        InsufficientData: claim_amount 등 필수 입력 결측 시 InsufficientData 반환.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryPredictRequest'
            example:
              product_name: "전세보증금반환보증"
              claim_amount: 218000000
              region_sido: "인천"
              housing_type: MULTI_HOUSEHOLD
              landlord_type: INDIVIDUAL_BUSINESS
      responses:
        "200":
          description: 회수율·회수등급 추론 성공
          headers:
            X-Model-Version:
              $ref: '#/components/headers/ModelVersionHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryPredictionOutput'
              example:
                expected_recovery_rate: 0.58
                recovery_grade: MEDIUM
                expected_recovery_amount: 126440000
                top_factors: ["claim_amount", "region_risk_group", "housing_type_group"]
                similar_group_summary: { region: "인천", housing_type: "다세대주택", sample_size: 388 }
                model_version: recovery_regressor_v1.0.0
                model_result_status: Success
                is_mock: false
        "422":
          $ref: '#/components/responses/ValidationError'
  /ml/duration/predict:
    post:
      operationId: mlDurationPredict
      tags: [ML]
      summary: "[ML] 처리기간 추론 (모델 3)"
      description: |
        경공매 신청 또는 사고 발생 이후 배당·처리까지 예상 소요기간을 절차유형별로 추론한다(ML개발가이드 14장, 부록 C).
        서로 다른 절차의 기간을 하나로 섞지 않고 `procedure_type` Feature로 구분한다. HUG-02 화면과 `/hug/dashboard` 집계가 사용.
      x-permission: hug_admin (Backend 내부 Recovery Service 경유)
      x-mock-supported: true
      x-fallback-policy: |
        Mock: is_mock=true(mock_scenario_8 대응). Fallback: 절차유형 미상 시 전체 중앙값(Baseline)으로 대체.
        RuleOnlyFallback: 모델 로딩 실패 시 절차유형별 그룹 중앙값으로 대체.
        InsufficientData: procedure_type/claim_amount 결측 시 InsufficientData 반환.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DurationPredictRequest'
            example:
              procedure_type: "경공매신청~배당"
              claim_amount: 151191001
              region_sido: "서울"
              product_name: "전세보증금반환보증"
      responses:
        "200":
          description: 처리기간 추론 성공
          headers:
            X-Model-Version:
              $ref: '#/components/headers/ModelVersionHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DurationPrediction'
              example:
                expected_days: 454
                expected_range: { lower: 320, upper: 600 }
                delay_risk: HIGH
                top_factors: ["procedure_type", "claim_amount"]
                model_version: duration_regressor_v1.0.0
                model_result_status: Success
                is_mock: false
        "422":
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Bearer 토큰. `role` 클레임(tenant/landlord/advisor/hug_admin/system_admin/verifier)을 포함한다.
        `verifier`는 advisor 내 서브 권한으로, `/verifications/{id}/decision` 액션 권한 판정에만 사용한다
        (Frontend_UIUX_명세서 3장, 개발설계보고서 13.5절). 발급/폐기 상세 구현은 Backend_API_명세서_260714.md에서 확정한다.
  parameters:
    CaseIdPath:
      name: case_id
      in: path
      required: true
      description: risk_assessment 조회 단위 케이스 ID
      schema:
        $ref: '#/components/schemas/UUID'
    ContractIdPath:
      name: contract_id
      in: path
      required: true
      description: 계약 식별자
      schema:
        $ref: '#/components/schemas/UUID'
    VerificationIdPath:
      name: verification_id
      in: path
      required: true
      description: 검증 결과 식별자
      schema:
        $ref: '#/components/schemas/UUID'
    PageParam:
      name: page
      in: query
      required: false
      description: 페이지 번호(1부터 시작)
      schema:
        type: integer
        minimum: 1
        default: 1
    SizeParam:
      name: size
      in: query
      required: false
      description: 페이지당 항목 수
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    RequestIdHeaderParam:
      name: Request-ID
      in: header
      required: false
      description: 클라이언트가 지정하는 요청 추적 ID. 미지정 시 서버가 생성해 응답 헤더로 반환한다.
      schema:
        type: string
    TraceIdHeaderParam:
      name: Trace-ID
      in: header
      required: false
      description: 분산 트레이싱용 상관관계 ID(OpenTelemetry trace_id 등).
      schema:
        type: string
    ModelVersionHeaderParam:
      name: X-Model-Version
      in: header
      required: false
      description: 클라이언트가 특정 모델 버전 강제 지정을 요청할 때 사용(테스트/롤백 용도, MVP 이후 지원).
      schema:
        type: string
    BlockchainVersionHeaderParam:
      name: X-Blockchain-Version
      in: header
      required: false
      description: 스마트컨트랙트/ABI 버전 지정 헤더(Blockchain_설계서_260714.md 배포 버전과 매핑).
      schema:
        type: string
  headers:
    RequestIdHeader:
      description: 요청-응답을 연결하는 추적 ID. 클라이언트가 보낸 `Request-ID`를 그대로 반환하거나 서버가 생성한다.
      schema:
        type: string
    TraceIdHeader:
      description: 분산 트레이싱 상관관계 ID.
      schema:
        type: string
    ModelVersionHeader:
      description: 응답 생성에 사용된 실제 ML 모델 버전(추론 API에서만 반환).
      schema:
        type: string
    BlockchainVersionHeader:
      description: 응답 생성에 사용된 스마트컨트랙트/ABI 버전(블록체인 API에서만 반환).
      schema:
        type: string
  responses:
    SuccessResponse:
      description: 공통 성공 응답. status=Success, data에 실제 페이로드, request_id 포함.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestIdHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    ErrorResponse:
      description: 공통 오류 응답 포맷(모든 4xx/5xx 응답의 기본 구조). error_code는 ERROR-NNN 형식을 따른다.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: Failed
            error:
              error_code: ERROR-001
              message: "예상하지 못한 오류가 발생했습니다."
              details: null
            request_id: "req_20260714_9999"
    ValidationError:
      description: 요청 값 검증 실패(422). Zod/Pydantic 검증 오류를 필드 단위로 반환한다.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - type: object
                properties:
                  error:
                    type: object
                    properties:
                      error_code:
                        type: string
                        example: ERROR-002
                      message:
                        type: string
                        example: "요청 값이 유효하지 않습니다."
                      field_errors:
                        type: array
                        items:
                          $ref: '#/components/schemas/ValidationErrorItem'
          example:
            status: Failed
            error:
              error_code: ERROR-002
              message: "요청 값이 유효하지 않습니다."
              field_errors:
                - field: deposit
                  reason: "0보다 큰 정수여야 합니다."
            request_id: "req_20260714_0100"
    Unauthorized:
      description: 인증 실패(401). 토큰 없음/만료/서명 불일치.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: Failed
            error: { error_code: ERROR-004, message: "인증 토큰이 유효하지 않습니다." }
            request_id: "req_20260714_0101"
    Forbidden:
      description: 권한 없음(403). 역할(role)이 허용되지 않거나 verifier 서브 권한이 없는 경우.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: Failed
            error: { error_code: ERROR-005, message: "해당 작업을 수행할 권한이 없습니다." }
            request_id: "req_20260714_0102"
    NotFound:
      description: 리소스 없음(404). 존재하지 않거나 본인 소유가 아닌 리소스에 대한 조회.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: Failed
            error: { error_code: ERROR-006, message: "요청한 리소스를 찾을 수 없습니다." }
            request_id: "req_20260714_0103"
    Conflict:
      description: 상태 충돌(409). 중복 접수, 상태 전이 규칙 위반 등.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: Failed
            error: { error_code: ERROR-007, message: "이미 접수된 사건이 존재합니다." }
            request_id: "req_20260714_0104"
    Timeout:
      description: 외부 API/모델 응답 지연(408). 데이터수집_및_API가이드 5장 Fallback Flow 대상.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: Failed
            error: { error_code: ERROR-008, message: "외부 API 응답이 지연되어 재시도가 필요합니다." }
            request_id: "req_20260714_0105"
    Partial:
      description: 부분 성공(206). APIResultStatus=Partial 또는 표본 부족 등 참고용 데이터를 의미한다.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  warnings:
                    type: array
                    items:
                      type: string
          example:
            status: Partial
            data: {}
            warnings: ["표본이 적어 참고용으로만 사용하세요."]
            request_id: "req_20260714_0106"
    Mock:
      description: |
        Mock/시연 데이터 응답(200). 실제 API·모델 실패 또는 발표 모드(useMockModeStore)에서 반환되며
        본문에 `is_mock: true` 또는 `api_result_status: MockFallback` / `model_result_status: RuleOnlyFallback`
        중 하나 이상이 명시된다. Mock 결과는 실제 예측 성능으로 간주하지 않는다(ML개발가이드 2장 원칙 5).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
          example:
            status: Success
            data: { is_mock: true }
            request_id: "req_20260714_0107"
  schemas:
    # ======================================================================
    # 1. 공통 Schema (Common Schema) - 7종
    # ======================================================================
    UUID:
      type: string
      format: uuid
      description: 전역 고유 식별자. 개발설계보고서 10.1절 공통 식별자 16종은 모두 이 포맷을 사용한다.
      example: "8f14e45f-ceea-4b4f-9c1a-000000000001"
    Timestamp:
      type: string
      format: date-time
      description: KST 기준 ISO 8601 일시(개발설계보고서 10.5절). 오프셋 `+09:00`을 포함해 표기한다.
      example: "2026-07-14T13:30:00+09:00"
    Money:
      type: integer
      format: int64
      minimum: 0
      description: KRW 정수 원 단위 금액(개발설계보고서 10.5절). 화면에서는 천 단위 구분을 적용해 표시한다.
      example: 400000000
    Pagination:
      type: object
      description: 목록 API 공통 페이지네이션 응답.
      required: [page, size, total_elements, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        size:
          type: integer
          minimum: 1
          example: 20
        total_elements:
          type: integer
          minimum: 0
          example: 1
        total_pages:
          type: integer
          minimum: 0
          example: 1
    File:
      type: object
      description: 업로드 파일 메타데이터(증빙, 계약서 원문 등). 원문은 Object Storage에 저장되고 API는 참조 메타데이터만 전달한다.
      required: [file_name, content_type, size_bytes]
      properties:
        file_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        file_name:
          type: string
          example: "말소확인서.pdf"
        content_type:
          type: string
          example: "application/pdf"
        size_bytes:
          type: integer
          minimum: 0
          example: 245678
        document_hash:
          type: string
          readOnly: true
          description: SHA-256 해시(온체인 기록 대상). 원문 자체는 온체인에 저장하지 않는다.
          example: "sha256:9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08"
        object_uri:
          type: string
          readOnly: true
          description: Object Storage 참조 경로(권한 기반 접근).
          example: "s3://hug-anshim/evidence/dd000000.pdf"
    Coordinate:
      type: object
      description: 좌표 정보(장기 확장 대상, 개발설계보고서 부록 E). 현재는 선택적 필드로 제공한다.
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 37.5013
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 127.0397
    Address:
      type: object
      description: 도로명주소/지번주소/법정동코드/건물관리번호를 구분하는 표준 주소 객체(개발설계보고서 10.5절).
      required: [road_address]
      properties:
        road_address:
          type: string
          example: "서울특별시 강남구 테헤란로 000"
        jibun_address:
          type: [string, "null"]
          example: "서울특별시 강남구 역삼동 000-00"
        adm_cd:
          type: [string, "null"]
          description: 법정동코드
          example: "1168010100"
        bd_mgt_sn:
          type: [string, "null"]
          description: 건물관리번호
          example: "1168010100100010000000001"
        zip_no:
          type: [string, "null"]
          example: "06212"
        dong:
          type: [string, "null"]
          description: 동(공동주택). 상세주소 최소화 원칙에 따라 선택 필드로만 제공한다(데이터수집가이드 13장).
        ho:
          type: [string, "null"]
          description: 호(공동주택).
        coordinate:
          $ref: '#/components/schemas/Coordinate'
    # ======================================================================
    # 공통 Response 스키마 (SuccessResponse/ErrorResponse/ValidationErrorItem)
    # ======================================================================
    SuccessResponse:
      type: object
      description: 모든 성공 응답의 공통 봉투(envelope). data 필드는 각 API별 실제 스키마로 대체된다.
      required: [status, data, request_id]
      properties:
        status:
          type: string
          enum: [Success, Partial]
          example: Success
        data:
          description: 실제 응답 페이로드. 각 API operation에서 구체 스키마로 재정의한다.
          type: object
        request_id:
          type: string
          description: Request-ID 헤더와 동일한 값을 본문에도 포함해 로그 상관관계를 보장한다.
          example: "req_20260714_0001"
    ErrorResponse:
      type: object
      description: 모든 오류 응답의 공통 봉투. error_code는 "ERROR-NNN" 형식(하단 오류코드 표 참조).
      required: [status, error, request_id]
      properties:
        status:
          type: string
          enum: [Failed]
          example: Failed
        error:
          type: object
          required: [error_code, message]
          properties:
            error_code:
              type: string
              pattern: '^ERROR-[0-9]{3}$'
              example: ERROR-006
            message:
              type: string
              example: "요청한 리소스를 찾을 수 없습니다."
            details:
              type: [object, "null"]
              additionalProperties: true
        request_id:
          type: string
          example: "req_20260714_9999"
    ValidationErrorItem:
      type: object
      description: 필드 단위 검증 오류 항목.
      required: [field, reason]
      properties:
        field:
          type: string
          example: deposit
        reason:
          type: string
          example: "0보다 큰 정수여야 합니다."
    # ======================================================================
    # 2. 공통 Enum (Common Enum) - 14종 (개발설계보고서 10.2절, 부록 C 및 관련 문서 기준)
    # ======================================================================
    ContractStatus:
      type: string
      description: 계약 생애주기 상태(개발설계보고서 10.2절, 8단계 생애주기와 1:1 대응). 전이 상세는 Backend_API_명세서_260714.md에서 확정한다.
      enum:
        - Draft
        - Diagnosed
        - EvidenceRequested
        - EvidenceSubmitted
        - Verified
        - ContractFinalized
        - Monitoring
        - D90Requested
        - ReturnPlanSubmitted
        - AtRisk
        - IncidentReported
        - TransferredToHUG
        - RecoveryInProgress
        - Closed
      example: Monitoring
    VerificationStatus:
      type: string
      description: 증빙·검증 진행 상태(개발설계보고서 10.2절).
      enum: [Pending, Submitted, Reviewing, Verified, Rejected, Expired]
      example: Reviewing
    BlockchainStatus:
      type: string
      description: 온체인 기록 상태(개발설계보고서 10.2절). Confirmed라도 법적 효력을 의미하지 않는다(Frontend_UIUX_명세서 10.4절).
      enum: [NotRequested, Pending, Confirmed, Failed]
      example: Confirmed
    APIResultStatus:
      type: string
      description: 외부 API 조회 결과 상태(개발설계보고서 10.2절, 데이터수집_및_API가이드 5장 Fallback Flow).
      enum: [Success, Partial, Failed, MockFallback]
      example: Success
    ModelResultStatus:
      type: string
      description: ML 모델 추론 결과 상태(개발설계보고서 10.2절, ML개발가이드 2장 원칙 8·20.2절).
      enum: [Success, RuleOnlyFallback, Failed, InsufficientData]
      example: Success
    RecoveryGrade:
      type: string
      description: 회수등급(모델 2 출력, ML개발가이드 13.7절). 배당률/회수완료 여부 기반 3단계 등급이며 인과적 회수 보장이 아니다.
      enum: [LOW, MEDIUM, HIGH]
      example: MEDIUM
    DelayRisk:
      type: string
      description: 처리기간 지연 위험(모델 3 출력, ML개발가이드 14.6절). 180일 등 임계값 기준 3단계 등급이다.
      enum: [LOW, MEDIUM, HIGH]
      example: HIGH
    RiskGrade:
      type: string
      description: 위험진단 등급(Frontend_UIUX_명세서 5.3절 TEN-03). 규칙 엔진과 ML 위험유사도를 결합한 최종 등급이다.
      enum: [LOW, MEDIUM, HIGH]
      example: HIGH
    UserRole:
      type: string
      description: 사용자 역할(개발설계보고서 13.5절, Frontend_UIUX_명세서 3장). verifier는 advisor 내 서브 권한이다.
      enum: [tenant, landlord, advisor, hug_admin, system_admin, verifier]
      example: tenant
    NotificationType:
      type: string
      description: 알림 유형(Frontend_UIUX_명세서 COMMON-01, 개발설계보고서 10.3절 공통 이벤트 기반).
      enum:
        - EvidenceRequested
        - D90Reminder
        - VerificationResult
        - RiskAssessed
        - IncidentUpdate
        - BlockchainConfirmed
        - ExpertReferral
        - SystemAlert
      example: D90Reminder
    EvidenceType:
      type: string
      description: 증빙 유형(Backend_API_명세서에서 세부 확정, 데이터수집_및_API가이드 6장 Mock 대상과 연계).
      enum:
        - REGISTRY_CANCELLATION_PROOF
        - BUSINESS_STATUS_PROOF
        - OWNERSHIP_PROOF
        - INSURANCE_PROOF
        - RETURN_PLAN_DOCUMENT
        - CONTRACT_DOCUMENT
        - OTHER
      example: REGISTRY_CANCELLATION_PROOF
    DisputeType:
      type: string
      description: 상담 분쟁유형 8클래스(ML개발가이드 12.2절, 실데이터 938건 기준 분포 그대로 유지).
      enum:
        - GENERAL_INQUIRY
        - AUCTION
        - DEPOSIT_NON_RETURN
        - LEASE_FRAUD
        - IMPLICIT_RENEWAL_DISPUTE
        - RESTORATION_SETTLEMENT
        - DOUBLE_CONTRACT
        - PRIOR_MORTGAGE_TRANSFER
      example: DEPOSIT_NON_RETURN
    HousingType:
      type: string
      description: 주택유형(ML개발가이드 10장 Feature Engineering, 데이터수집_및_API가이드 건축물대장 연계).
      enum:
        - MULTI_HOUSEHOLD
        - MULTI_FAMILY
        - APARTMENT
        - OFFICETEL
        - SINGLE_FAMILY
        - ROW_HOUSE
        - OTHER
      example: MULTI_HOUSEHOLD
    LandlordType:
      type: string
      description: 임대인 유형(개발설계보고서 표 9, ML개발가이드 부록 B landlord_type Feature).
      enum: [INDIVIDUAL, INDIVIDUAL_BUSINESS, CORPORATION]
      example: INDIVIDUAL
    # ======================================================================
    # 3. Entity Schema - 19종 (개발설계보고서 13.3절 핵심 엔터티 + Frontend/HUG 화면에 필요한 보조 엔터티)
    # ======================================================================
    User:
      type: object
      description: 사용자와 역할(개발설계보고서 부록 B user_id).
      required: [user_id, role]
      properties:
        user_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        role:
          $ref: '#/components/schemas/UserRole'
        display_name:
          type: string
          example: "홍길동"
        email:
          type: [string, "null"]
          format: email
        is_active:
          type: boolean
          default: true
        created_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
        last_login_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
    Property:
      type: object
      description: 주소 정규화 후 물건 식별 단위(개발설계보고서 부록 B property_id).
      required: [property_id, address]
      properties:
        property_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        address:
          $ref: '#/components/schemas/Address'
        housing_type:
          $ref: '#/components/schemas/HousingType'
        building_age_years:
          type: [integer, "null"]
          minimum: 0
        created_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
    Contract:
      type: object
      description: 계약 생애주기 중심 엔터티(개발설계보고서 부록 B contract_id, 13.4절 ERD).
      required: [contract_id, property_id, contract_status, deposit]
      properties:
        contract_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        property_id:
          $ref: '#/components/schemas/UUID'
        tenant_user_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        landlord_user_id:
          type: [string, "null"]
          format: uuid
          readOnly: true
        contract_status:
          $ref: '#/components/schemas/ContractStatus'
        deposit:
          $ref: '#/components/schemas/Money'
        contract_start_date:
          type: string
          format: date
          example: "2026-08-01"
        contract_end_date:
          type: string
          format: date
          example: "2028-07-31"
        landlord_type:
          $ref: '#/components/schemas/LandlordType'
        housing_type:
          $ref: '#/components/schemas/HousingType'
        latest_contract_version_id:
          type: [string, "null"]
          format: uuid
          readOnly: true
        created_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
        updated_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
    ContractVersion:
      type: object
      description: 계약서 버전 식별(개발설계보고서 부록 B contract_version_id). 초안·보완·최종·HUG 제출본을 구분한다.
      required: [contract_version_id, contract_id, version_label]
      properties:
        contract_version_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        contract_id:
          $ref: '#/components/schemas/UUID'
        version_label:
          type: string
          enum: [Draft, Amended, Final, HUGSubmission]
          example: Final
        document_hash:
          type: string
          readOnly: true
          example: "sha256:6b8f9e..."
        blockchain_tx_id:
          type: [string, "null"]
          format: uuid
          readOnly: true
        created_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
    RegistrySnapshot:
      type: object
      description: 등기/외부 API 조회 시점 스냅샷(개발설계보고서 부록 B registry_snapshot_id, 데이터수집_및_API가이드 6·12장).
      required: [registry_snapshot_id, property_id, api_result_status]
      properties:
        registry_snapshot_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        property_id:
          $ref: '#/components/schemas/UUID'
        api_call_id:
          $ref: '#/components/schemas/UUID'
        api_result_status:
          $ref: '#/components/schemas/APIResultStatus'
        source:
          type: string
          description: 원천 시스템(codef/mock/user_upload 등, 데이터수집_및_API가이드 10장).
          example: codef
        rights_summary:
          type: [object, "null"]
          description: 근저당·압류 등 권리부담 요약(원문 비저장, 요약 값만 보관).
          additionalProperties: true
        fetched_at:
          allOf: [{ $ref: '#/components/schemas/Timestamp' }]
          readOnly: true
    RiskAssessment:
      type: object
      description: 위험진단 결과 엔터티(개발설계보고서 부록 B risk_assessment_id).
      required: [risk_assessment_id, case_id, risk_grade, risk_reasons]
      properties:
        risk_assessment_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          readOnly: true
        case_id:
          $ref: '#/components/schemas/UUID'
        contract_id:
          type: [string, "null"]
          format: uuid
        risk_grade:
          $ref: '#/components/schemas/RiskGrade'
        risk_score:
          type: [number, "null"]
          deprecated: true
          description: >-
